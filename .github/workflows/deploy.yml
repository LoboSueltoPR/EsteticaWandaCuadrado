name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # permite dispararlo manualmente desde GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Inyectar credenciales Firebase desde GitHub Secrets ──
      # Reemplaza los placeholders ${VAR} del template con los valores reales.
      # Las claves NUNCA quedan en el repositorio — solo en los secrets cifrados.
      - name: Generar firebase-config.js desde secrets/variables
        env:
          FIREBASE_API_KEY:            ${{ secrets.FIREBASE_API_KEY || vars.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN || vars.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID || vars.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET || vars.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID || vars.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:             ${{ secrets.FIREBASE_APP_ID || vars.FIREBASE_APP_ID }}
        run: |
          envsubst < public/js/firebase-config.example.js > public/js/firebase-config.js
          echo "--- Verificando generación (sin mostrar valores) ---"
          grep -c 'FIREBASE' public/js/firebase-config.js && echo "⚠️ Quedan placeholders sin reemplazar!" || echo "✅ firebase-config.js generado correctamente"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
