<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Reservas — Wanda Cuadrado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="navbar"></div>

  <div class="container">
    <div class="page-header">
      <h1>Mis Reservas</h1>
      <p>Consultá, editá o cancelá tus turnos</p>
    </div>

    <div id="reserva-alert"></div>
    <div id="reservations-list">
      <div class="loading-overlay"><div class="spinner"></div> Cargando reservas...</div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/reservas.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = getNavbarHTML();
    document.getElementById('footer').innerHTML = getFooterHTML();
    initNavbar();

    requireAuth(async (user, userData) => {
      await loadMyReservations('reservations-list');
    });
  </script>
</body>
</html>
