<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — Estética Agus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <div id="navbar"></div>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Crear Cuenta</h1>
      <div id="auth-alert"></div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-nombre">Nombre completo *</label>
          <input type="text" class="form-control" id="reg-nombre" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
          <label for="reg-email">Email *</label>
          <input type="email" class="form-control" id="reg-email" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
          <label for="reg-telefono">Teléfono (opcional)</label>
          <input type="tel" class="form-control" id="reg-telefono" placeholder="Ej: 11-1234-5678">
        </div>
        <div class="form-group">
          <label for="reg-password">Contraseña *</label>
          <input type="password" class="form-control" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <div class="form-group">
          <label for="reg-password2">Repetir contraseña *</label>
          <input type="password" class="form-control" id="reg-password2" placeholder="Repetí tu contraseña" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Registrarme</button>
      </form>

      <div class="auth-footer">
        <p>¿Ya tenés cuenta? <a href="/login.html">Iniciar sesión</a></p>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = getNavbarHTML();
    document.getElementById('footer').innerHTML = getFooterHTML();
    initNavbar();

    // Si ya está logueado, redirigir
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
