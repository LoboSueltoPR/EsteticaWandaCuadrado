<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Cremas — Wanda Cuadrado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="navbar"></div>

  <!-- Hero tienda -->
  <div class="tienda-hero">
    <h1>Mis Cremas</h1>
    <p>Cosmética artesanal elaborada con mis propias manos.<br>Ingredientes activos de alta calidad para tu piel.</p>
  </div>

  <div class="container">

    <!-- Filtros por categoría -->
    <div class="tienda-filtros">
      <button class="filtro-btn active" onclick="filtrar(this,'todos')">Todos</button>
      <button class="filtro-btn" onclick="filtrar(this,'facial')">Facial</button>
      <button class="filtro-btn" onclick="filtrar(this,'corporal')">Corporal</button>
    </div>

    <div id="alert-tienda"></div>

    <!-- Grilla de productos -->
    <div id="productos-container">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>

  </div>

  <!-- Modal de pedido -->
  <div class="modal-overlay" id="pedido-modal" onclick="if(event.target===this)cerrarModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-nombre">Producto</h3>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>

      <div id="pedido-alert"></div>

      <div class="modal-resumen">
        <div class="modal-resumen-row">
          <span>Precio del producto</span>
          <strong id="modal-precio"></strong>
        </div>
        <div class="modal-resumen-row senia">
          <span>Seña a pagar ahora (10%)</span>
          <strong id="modal-senia"></strong>
        </div>
        <div class="modal-resumen-row">
          <span>Saldo al retirar</span>
          <strong id="modal-saldo"></strong>
        </div>
      </div>

      <p class="modal-nota">
        Tu pedido queda reservado al pagar la seña. El saldo restante lo abonás cuando lo retirás en el local.
      </p>

      <button id="modal-btn-pagar" class="btn btn-mp btn-block" onclick="procesarPedido()">
        Pagar seña con Mercado Pago
      </button>

      <!-- DEV bypass: solo visible si config/mp.devBypass === true -->
      <button id="modal-btn-dev" class="btn btn-block" style="display:none; margin-top:.6rem; background:#7BAE7F; color:#fff;" onclick="procesarPedidoDev()">
        ⚡ Simular pago aprobado (DEV)
      </button>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/tienda.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = getNavbarHTML();
    document.getElementById('footer').innerHTML = getFooterHTML();
    initNavbar();

    // Aviso si viene de pago fallido
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === 'pago_fallido') {
      showAlert('alert-tienda', 'El pago no fue completado. Podés intentar encargar de nuevo.', 'error');
    }

    // Cargar productos (público, sin necesidad de login para ver)
    loadProductos('productos-container');

    // Limpiar pedidos vencidos si está logueado
    auth.onAuthStateChanged(user => {
      if (user) cleanupMyExpiredOrders(user.uid);
    });

    // Mostrar botón DEV si está habilitado en config/mp
    (async () => {
      try {
        const mpCfgDoc = await db.collection('config').doc('mp').get();
        if (mpCfgDoc.exists && mpCfgDoc.data().devBypass === true) {
          document.getElementById('modal-btn-dev').style.display = 'block';
        }
      } catch (e) {}
    })();

    function filtrar(btn, cat) {
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadProductos('productos-container', cat);
    }
  </script>
</body>
</html>
